<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="a fullscreen pixel game rendered with rust and webassembly">
    <title>pixel buffer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-transform: lowercase;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .fps {
            position: fixed;
            bottom: 6px;
            left: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: rgba(64, 64, 88, 0.7);
            font-variant-numeric: tabular-nums;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <p class="fps" id="fps">loading wasm…</p>
    <script type="module">
        import init, { PixelBuffer } from './pkg/game_wasm.js';

        async function run() {
            const wasm = await init();
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const fpsEl = document.getElementById('fps');

            // full native resolution — zoom is handled in rust
            let w = window.innerWidth;
            let h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            const buffer = new PixelBuffer(w, h);
            let width = buffer.width();
            let height = buffer.height();

            // ---- resize ----
            window.addEventListener('resize', () => {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                buffer.resize(w, h);
                width = buffer.width();
                height = buffer.height();
            });

            // ---- scroll wheel zoom (desktop) ----
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                buffer.on_scroll(e.deltaY, e.clientX, e.clientY);
            }, { passive: false });

            // ---- pinch zoom (mobile) ----
            let pinchStartDist = 0;

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    pinchStartDist = Math.hypot(dx, dy);
                    e.preventDefault();
                } else if (e.touches.length === 1) {
                    e.preventDefault();
                    const t = e.touches[0];
                    buffer.on_click(t.clientX, t.clientY);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    const mid_x = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const mid_y = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                    // fake a scroll delta based on pinch direction
                    const delta = dist > pinchStartDist ? -1 : 1;
                    buffer.on_scroll(delta * 30, mid_x, mid_y);
                    pinchStartDist = dist;
                }
            }, { passive: false });

            // ---- click (desktop) ----
            canvas.addEventListener('click', (e) => {
                buffer.on_click(e.clientX, e.clientY);
            });

            // ---- render loop ----
            let lastTime = performance.now();
            let frameCount = 0;
            let fpsDisplay = 0;

            function frame(time) {
                buffer.tick(time);
                const ptr = buffer.pointer();
                const len = width * height * 4;
                const pixels = new Uint8ClampedArray(wasm.memory.buffer, ptr, len);
                const imageData = new ImageData(pixels, width, height);
                ctx.putImageData(imageData, 0, 0);

                frameCount++;
                const elapsed = time - lastTime;
                if (elapsed >= 1000) {
                    fpsDisplay = Math.round((frameCount / elapsed) * 1000);
                    frameCount = 0;
                    lastTime = time;
                    fpsEl.textContent = `${fpsDisplay} fps · ${width}×${height} · wasm`;
                }
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }
        run();
    </script>
</body>

</html>
