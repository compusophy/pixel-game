<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="a fullscreen pixel game rendered with rust and webassembly">
    <title>pixel game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-transform: lowercase;
            font-family: 'Inter', sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .fps {
            position: fixed;
            bottom: 6px;
            left: 8px;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: rgba(64, 64, 88, 0.7);
            font-variant-numeric: tabular-nums;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <p class="fps" id="fps">loading wasm…</p>

    <script type="module">
        import init, { PixelBuffer } from './pkg/game_wasm.js';

        async function run() {
            const wasm = await init();
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            const fpsEl = document.getElementById('fps');

            let w = window.innerWidth;
            let h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;

            const buffer = new PixelBuffer(w, h);
            let width = buffer.width();
            let height = buffer.height();

            let ws = null;
            let isConnected = false;

            // ---- WebSocket Setup ----
            function connectWebSocket(username, isTutorial) {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;

                ws = new WebSocket(wsUrl);
                ws.binaryType = "arraybuffer";

                ws.onopen = () => {
                    console.log("connected to server", isTutorial ? "(tutorial)" : "");
                    isConnected = true;

                    // send Join message
                    const joinMsg = PixelBuffer.create_join_msg(username, isTutorial);
                    ws.send(joinMsg);
                };

                ws.onmessage = (event) => {
                    const data = new Uint8Array(event.data);
                    buffer.receive_message(data);
                };

                ws.onclose = () => {
                    console.log("disconnected from server");
                    isConnected = false;
                    ws = null;
                };

                ws.onerror = (err) => {
                    console.error("websocket error", err);
                    isConnected = false;
                };
            }

            // ---- Input Bridge ----
            window.addEventListener('keydown', (e) => {
                buffer.on_key(e.key, true);
                if (e.key === 'Backspace') e.preventDefault();
            });
            window.addEventListener('keyup', (e) => {
                buffer.on_key(e.key, false);
            });

            // ---- resize ----
            window.addEventListener('resize', () => {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                buffer.resize(w, h);
                width = buffer.width();
                height = buffer.height();
            });

            // ---- scroll wheel zoom (desktop) ----
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                buffer.on_scroll(e.deltaY, e.clientX, e.clientY);
            }, { passive: false });

            // ---- click (desktop) ----
            canvas.addEventListener('mousedown', (e) => {
                buffer.on_click(e.clientX, e.clientY);
            });

            // ---- touch help ----
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    buffer.on_click(t.clientX, t.clientY);
                }
                e.preventDefault();
            }, { passive: false });

            // ---- render loop ----
            let lastTime = 0;
            let frameCount = 0;
            let fpsDisplay = 0;

            function frame(time) {
                // Check for connection requests from WASM
                const req = buffer.poll_connection_request();
                if (req) {
                    connectWebSocket(req.name, req.is_tutorial);
                }

                buffer.tick(time);

                // send pending messages to server if connected
                if (ws && ws.readyState === WebSocket.OPEN) {
                    while (true) {
                        const msg = buffer.poll_message();
                        if (!msg) break;
                        try {
                            ws.send(msg);
                        } catch (e) {
                            console.error("error sending message", e);
                        }
                    }
                }

                const ptr = buffer.pointer();
                const len = width * height * 4;
                const pixels = new Uint8ClampedArray(wasm.memory.buffer, ptr, len);
                const imageData = new ImageData(pixels, width, height);
                ctx.putImageData(imageData, 0, 0);

                frameCount++;
                const elapsed = time - lastTime;
                if (elapsed >= 1000) {
                    fpsDisplay = Math.round((frameCount / elapsed) * 1000);
                    frameCount = 0;
                    lastTime = time;
                    fpsEl.textContent = `${fpsDisplay} fps · ${width}×${height} · native wasm ui`;
                }
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        }
        run();
    </script>
</body>

</html>
